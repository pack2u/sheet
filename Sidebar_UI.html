<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <style>
      body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        padding: 16px;
        background-color: #f8f9fa;
        color: #333;
        margin: 0;
      }
      h2 {
        font-size: 18px;
        font-weight: 600;
        margin-bottom: 20px;
        display: flex;
        align-items: center;
        gap: 8px;
        color: #1a1a1a;
      }
      .form-group {
        margin-bottom: 16px;
      }
      label {
        display: block;
        font-size: 13px;
        font-weight: 500;
        margin-bottom: 6px;
        color: #555;
      }
      input[type="text"], select {
        width: 100%;
        padding: 10px;
        border: 1px solid #ddd;
        border-radius: 6px;
        box-sizing: border-box;
        font-size: 14px;
        transition: border-color 0.2s;
      }
      input[type="text"]:focus, select:focus {
        border-color: #333;
        outline: none;
      }
      .file-upload-wrapper {
        border: 2px dashed #ccc;
        border-radius: 8px;
        padding: 20px;
        text-align: center;
        background: #fff;
        cursor: pointer;
        transition: border-color 0.2s;
        position: relative;
      }
      .file-upload-wrapper:hover {
        border-color: #888;
      }
      .file-upload-wrapper input[type="file"] {
        position: absolute;
        width: 100%;
        height: 100%;
        top: 0;
        left: 0;
        opacity: 0;
        cursor: pointer;
      }
      .icon {
        width: 24px;
        height: 24px;
        fill: #555;
        margin-bottom: 8px;
      }
      .preview-image {
        width: 100%;
        max-height: 200px;
        object-fit: contain;
        border-radius: 6px;
        margin-top: 10px;
        display: none;
        background: #fff;
        border: 1px solid #eee;
      }
      button {
        width: 100%;
        padding: 12px;
        background-color: #1a1a1a;
        color: #fff;
        border: none;
        border-radius: 6px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: background-color 0.2s;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
      }
      button:hover {
        background-color: #333;
      }
      button:disabled {
        background-color: #ccc;
        cursor: not-allowed;
      }
      .btn-secondary {
        background-color: #fff;
        color: #1a1a1a;
        border: 1px solid #ddd;
        margin-top: 8px;
      }
      .btn-secondary:hover {
        background-color: #f1f1f1;
      }
      #result-section {
        display: none;
        margin-top: 24px;
        padding-top: 24px;
        border-top: 1px solid #eee;
      }
      .status {
        font-size: 13px;
        color: #666;
        text-align: center;
        margin-top: 10px;
      }
    </style>
  </head>
  <body>

    <h2>
      <svg class="icon" viewBox="0 0 24 24" style="margin:0; width:20px; height:20px;"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-9 14l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
      AI 사진 가공
    </h2>

    <div class="form-group">
      <label>1. 상품명 (저장 폴더 매칭용)</label>
      <input type="text" id="productName" placeholder="예: 샐러드용기_1단" required>
    </div>

    <div class="form-group">
      <label>2. 원본 이미지 업로드</label>
      <div class="file-upload-wrapper" id="uploadWrapper">
        <svg class="icon" viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
        <div style="font-size: 13px; color: #666;">클릭하여 PC에서 이미지 선택</div>
        <input type="file" id="imageInput" accept="image/png, image/jpeg">
      </div>
      <img id="sourcePreview" class="preview-image">
    </div>

    <div class="form-group">
      <label>3. AI 가공 옵션 선택</label>
      <select id="aiOption">
        <option value="background">고급스러운 배경 적용</option>
        <option value="angle">다양한 보는 각도 (45도 측면 등)</option>
        <option value="food">음식이 담긴 연출 (Food Plating)</option>
      </select>
    </div>

    <button id="btnGenerate" onclick="generateImage()">
      <svg class="icon" viewBox="0 0 24 24" style="fill:#fff; margin:0; width:18px; height:18px;"><path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/></svg>
      AI 이미지 생성하기
    </button>
    <div id="statusMsg" class="status"></div>

    <div id="result-section">
      <label>가공 완료 이미지 미리보기</label>
      <img id="resultPreview" class="preview-image" style="display:block; margin-bottom: 12px;">
      
      <button id="btnSave" onclick="saveToDrive()">
        <svg class="icon" viewBox="0 0 24 24" style="fill:#fff; margin:0; width:18px; height:18px;"><path d="M19 12v7H5v-7H3v7c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2v-7h-2zm-6 .67l2.59-2.58L17 11.5l-5 5-5-5 1.41-1.41L11 12.67V3h2v9.67z"/></svg>
        드라이브 지정 폴더에 저장
      </button>
      <button class="btn-secondary" onclick="resetForm()">초기화 및 새로하기</button>
    </div>

    <script>
      let currentBase64 = null;
      let currentMimeType = null;
      let generatedBase64 = null;

      document.getElementById('imageInput').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        currentMimeType = file.type;
        const reader = new FileReader();
        reader.onload = function(event) {
          currentBase64 = event.target.result;
          const preview = document.getElementById('sourcePreview');
          preview.src = currentBase64;
          preview.style.display = 'block';
          document.getElementById('uploadWrapper').style.display = 'none';
        };
        reader.readAsDataURL(file);
      });

      function generateImage() {
        const productName = document.getElementById('productName').value;
        const option = document.getElementById('aiOption').value;

        if (!productName) {
          alert('상품명을 입력해주세요.');
          return;
        }
        if (!currentBase64) {
          alert('원본 이미지를 업로드해주세요.');
          return;
        }

        const btn = document.getElementById('btnGenerate');
        const status = document.getElementById('statusMsg');
        btn.disabled = true;
        status.innerText = "AI 모델 처리 중입니다... (약 10~20초 소요)";

        google.script.run
          .withSuccessHandler(function(resultBase64) {
            generatedBase64 = resultBase64;
            
            // 만약 결과물에 data URI prefix가 없으면 붙여줌
            let src = resultBase64;
            if (!src.startsWith('data:')) {
              src = 'data:' + currentMimeType + ';base64,' + src;
              generatedBase64 = src;
            }

            document.getElementById('resultPreview').src = src;
            document.getElementById('result-section').style.display = 'block';
            status.innerText = "이미지 가공 완료!";
            btn.disabled = false;
          })
          .withFailureHandler(function(error) {
            alert('오류 발생: ' + error.message);
            status.innerText = "";
            btn.disabled = false;
          })
          .processImageWithAI(currentBase64, option, "");
      }

      function saveToDrive() {
        const productName = document.getElementById('productName').value;
        const btn = document.getElementById('btnSave');
        const status = document.getElementById('statusMsg');

        btn.disabled = true;
        status.innerText = "구글 드라이브에 저장 중입니다...";

        google.script.run
          .withSuccessHandler(function(url) {
            status.innerHTML = `<span style="color: #2e7d32; font-weight:600;">저장 성공!</span><br><a href="${url}" target="_blank">파일 확인하기</a>`;
            btn.disabled = false;
          })
          .withFailureHandler(function(error) {
            alert('저장 실패: ' + error.message);
            status.innerText = "";
            btn.disabled = false;
          })
          .saveImageToDrive(productName, generatedBase64, currentMimeType);
      }

      function resetForm() {
        currentBase64 = null;
        generatedBase64 = null;
        document.getElementById('imageInput').value = '';
        document.getElementById('sourcePreview').style.display = 'none';
        document.getElementById('uploadWrapper').style.display = 'block';
        document.getElementById('result-section').style.display = 'none';
        document.getElementById('statusMsg').innerText = '';
        document.getElementById('btnGenerate').disabled = false;
      }
    </script>
  </body>
</html>
